<title>羽球排隊</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+TC:wght@400;500;700&display=swap');

/* ── English Vintage Palette ── */
:root{
  --bg:       #ece7db;   /* parchment — bleacher floor */
  --surface:  #faf7f0;   /* cream white */
  --surface2: #f2ede3;   /* inset / input bg */
  --ink:      #1c1408;   /* deep warm black */
  --ink2:     #6b5c44;   /* leather brown */
  --ink3:     #9a8a72;   /* aged paper */
  --ink4:     #b8a890;   /* faded */
  --ring:     rgba(28,20,8,0.08);
  --ring-md:  rgba(28,20,8,0.13);
  --court-line: rgba(255,255,255,0.90); /* badminton court white lines */
  --green:    #2d5a3d;   /* racing green — court markings */
  --green-bg: #e2ede6;
  --green-sl: #d4e6d9;   /* slot bg */
  --walnut:   #7a4828;   /* walnut — seat colour */
  --walnut-bg:#f0e4d8;
  --walnut-sl:#ead9ce;   /* slot bg */
}

/* ── Reset & Base ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Inter','Noto Sans TC',sans-serif;
  font-variation-settings:'wght' 450;
  font-feature-settings:'ss02' 0;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  padding-bottom:88px;
}

/* ── Header ── */
header{
  background:var(--surface);
  padding:16px 18px 0;
  position:sticky;top:0;z-index:100;
  text-align:center;
}
header h1{font-size:18px;font-weight:700;color:var(--ink);letter-spacing:-0.02em}
header p{
  font-size:10px;color:var(--ink3);margin-top:4px;
  font-family:ui-monospace,monospace;
  text-transform:uppercase;letter-spacing:0.08em;
}

/* ── Tabs (forms bottom of header card) ── */
.tabs{
  display:flex;background:var(--surface);padding:0 16px;
  border-radius:0 0 22px 22px;
  box-shadow:0 0 0 3px var(--court-line),0 6px 16px rgba(28,20,8,0.12);
  margin-bottom:4px;
}
.tab{
  padding:10px 14px;
  font-size:10px;font-weight:600;color:var(--ink3);
  border-bottom:2px solid transparent;cursor:pointer;
  font-family:ui-monospace,monospace;
  text-transform:uppercase;letter-spacing:0.08em;
}
.tab.active{color:var(--ink);border-bottom-color:var(--green)}
.sec{display:none;padding:14px}
.sec.active{display:block}

/* ── Court controls ── */
.court-wrap{margin-bottom:14px}
.court-controls{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;padding:0 2px;
}
.court-ctrl-btn{
  width:32px;height:32px;border-radius:9999px;border:none;
  background:var(--surface);
  box-shadow:0 0 0 2px var(--court-line),inset 0 0 0 1px var(--ring);
  font-size:20px;line-height:1;color:var(--ink);
  cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;
}
.court-ctrl-btn:disabled{opacity:0.35;cursor:default}
.court-ctrl-btn:not(:disabled):active{transform:scale(.92)}
.court-count-lbl{
  font-size:11px;font-weight:600;color:var(--ink2);
  font-family:ui-monospace,monospace;text-transform:uppercase;letter-spacing:0.08em;
}
/* ── Court carousel ── */
.court-track{
  display:flex;
  overflow-x:auto;scroll-snap-type:x mandatory;scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
  padding:6px 6px 8px;margin:-6px -6px 0;
}
.court-track::-webkit-scrollbar{display:none}
.court-dots{display:flex;justify-content:center;gap:6px;margin-top:10px;height:8px}
.court-dot{
  height:6px;width:6px;border-radius:3px;
  background:var(--ring-md);
  transition:width .25s,background .25s;
}
.court-dot.active{width:18px;background:var(--green)}
/* ── Courts ── */
.court{
  flex:0 0 100%;scroll-snap-align:start;
  background:var(--surface);
  border-radius:16px;
  padding:12px;
  position:relative;
  box-shadow:0 0 0 3px var(--court-line),0 2px 8px rgba(28,20,8,0.10),inset 0 0 0 1px var(--ring);
}
.court::before{
  content:'';position:absolute;top:0;left:0;right:0;
  height:3px;background:var(--green);border-radius:16px 16px 0 0;
}
.court.playing::before{background:var(--walnut)}

/* Eyebrow label */
.cl{
  font-size:10px;font-weight:600;letter-spacing:0.1em;color:var(--ink3);
  text-transform:uppercase;margin-bottom:8px;
  font-family:ui-monospace,monospace;
}

/* Slots — concentric radii: court=16px, padding≈8px, slot=8px */
.slots{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:6px}
.slot{
  border-radius:8px;
  padding:7px 4px;font-size:11px;font-weight:600;
  text-align:center;color:var(--ink3);
  min-height:36px;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;
}
/* Racing green — left team */
.slot.L{background:var(--green-bg);box-shadow:inset 0 0 0 1px rgba(45,90,61,0.2)}
/* Walnut brown — right team */
.slot.R{background:var(--walnut-bg);box-shadow:inset 0 0 0 1px rgba(122,72,40,0.2)}
.slot.filled.L{background:var(--green-sl);box-shadow:inset 0 0 0 1.5px var(--green);color:var(--ink)}
.slot.filled.R{background:var(--walnut-sl);box-shadow:inset 0 0 0 1.5px var(--walnut);color:var(--ink)}
.slot .sk{font-size:9px;color:var(--ink4)}

.team-labels{
  display:flex;justify-content:space-between;
  font-size:9px;font-weight:600;margin-bottom:6px;
  font-family:ui-monospace,monospace;text-transform:uppercase;letter-spacing:0.06em;
}
.tl{color:var(--green)}.tr{color:var(--walnut)}

.ctimer{font-size:10px;color:var(--ink4);text-align:center;margin-bottom:6px;font-variant-numeric:tabular-nums}
.ctimer span{color:var(--ink);font-weight:700}

.cbtns{display:flex;gap:5px}
.cbtn{
  flex:1;padding:7px 3px;border:none;
  border-radius:9999px;
  font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;
}
.cbtn:active{opacity:.75;transform:scale(.96)}
.cbtn.s{background:var(--green);color:#fff}
.cbtn.e{background:var(--walnut);color:#fff}
.cbtn.c{background:var(--surface2);color:var(--ink2);box-shadow:inset 0 0 0 1px var(--ring)}

/* ── Queue ── */
.qhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.qtitle{
  font-size:10px;font-weight:600;color:var(--ink3);
  text-transform:uppercase;letter-spacing:0.1em;
  font-family:ui-monospace,monospace;
}
.qbadge{
  background:var(--ink);color:var(--surface);
  font-size:10px;font-weight:700;
  padding:2px 9px;border-radius:9999px;
}
.qlist{display:flex;flex-direction:column;gap:6px}
.qi{
  background:var(--surface);
  border-radius:12px;
  padding:10px 12px;
  display:flex;align-items:center;gap:10px;cursor:pointer;
  box-shadow:0 0 0 2px var(--court-line),inset 0 0 0 1px var(--ring);
}
.qi:active{transform:scale(.98)}
.qi.sel{box-shadow:inset 0 0 0 2px var(--ink);background:var(--surface2)}

.qrank{
  width:26px;height:26px;border-radius:50%;
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:var(--ink2);flex-shrink:0;
}
.qrank.top{background:var(--ink);color:var(--surface)}
.qinfo{flex:1}
.qname{font-size:13px;font-weight:600;letter-spacing:-0.01em}
.qmeta{font-size:10px;color:var(--ink4);margin-top:2px;line-height:1.6}
.qmeta .w{color:var(--ink2)}
.qbdg{
  font-size:9px;font-weight:600;
  padding:2px 7px;border-radius:9999px;flex-shrink:0;
  font-family:ui-monospace,monospace;text-transform:uppercase;letter-spacing:0.05em;
}
.bdg-n{background:var(--surface2);color:var(--ink3);box-shadow:inset 0 0 0 1px var(--ring)}

/* ── Skill dots — vintage tones ── */
.sdot{display:inline-flex;gap:2px;margin-left:4px;vertical-align:middle}
.sdot span{width:6px;height:6px;border-radius:50%;display:inline-block;background:var(--surface2)}
/* s1 — light green */
.sdot.s1 span:nth-child(1){background:#7a9e7e}
/* s2 — racing green */
.sdot.s2 span:nth-child(1),.sdot.s2 span:nth-child(2){background:var(--green)}
/* s3 — deep forest */
.sdot.s3 span{background:#1e3d28}

/* ── Member panel ── */
.mpanel{
  background:var(--surface);border-radius:16px;padding:14px;margin-bottom:14px;
  box-shadow:0 0 0 3px var(--court-line),0 2px 8px rgba(28,20,8,0.08),inset 0 0 0 1px var(--ring);
}
.mpanel h3{
  font-size:10px;font-weight:600;color:var(--ink3);
  text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;
  font-family:ui-monospace,monospace;
}
.irow{display:flex;gap:8px;margin-bottom:8px}
input[type=text]{
  flex:1;background:var(--surface2);border:none;
  box-shadow:inset 0 0 0 1px var(--ring-md);
  border-radius:9999px;
  padding:10px 14px;font-size:13px;font-family:inherit;color:var(--ink);outline:none;
}
input[type=text]:focus{box-shadow:inset 0 0 0 2px var(--green)}
input[type=text]::placeholder{color:var(--ink4)}
.btn-add{
  background:var(--green);color:#fff;border:none;
  border-radius:9999px;
  padding:10px 18px;font-size:13px;font-weight:600;
  font-family:inherit;cursor:pointer;white-space:nowrap;
}
.btn-add:active{transform:scale(.95)}
.skill-sel{display:flex;gap:6px}
.sk-opt{
  flex:1;padding:8px 4px;border:none;
  box-shadow:inset 0 0 0 1px var(--ring-md);
  border-radius:9999px;background:var(--surface2);
  color:var(--ink2);font-size:11px;font-weight:600;
  font-family:inherit;cursor:pointer;text-align:center;
}
.sk-opt.active{box-shadow:inset 0 0 0 2px var(--green);color:var(--green);background:var(--green-bg)}

/* ── Member list ── */
.mlist{display:flex;flex-direction:column;gap:6px}
.mi{
  background:var(--surface);border-radius:14px;
  padding:10px 12px;display:flex;align-items:center;gap:10px;
  box-shadow:0 0 0 2px var(--court-line),inset 0 0 0 1px var(--ring);
  transition:opacity .2s;
}
.mi.absent{opacity:.38}
/* Inline edit state */
.mi.editing{flex-direction:column;align-items:stretch;gap:8px;padding:12px}
.edit-row{display:flex;gap:8px;align-items:center}
.edit-inp{
  flex:1;background:var(--surface2);border:none;
  box-shadow:inset 0 0 0 2px var(--green);
  border-radius:9999px;
  padding:8px 12px;font-size:13px;font-family:inherit;color:var(--ink);outline:none;
}
.edit-skills{display:flex;gap:4px}
.edit-sk{
  padding:6px 9px;border:none;
  box-shadow:inset 0 0 0 1px var(--ring-md);
  border-radius:9999px;background:var(--surface2);
  color:var(--ink2);font-size:10px;font-weight:700;
  font-family:inherit;cursor:pointer;white-space:nowrap;
}
.edit-sk.active{box-shadow:inset 0 0 0 2px var(--green);color:var(--green);background:var(--green-bg)}
.edit-actions{display:flex;gap:6px}
.edit-save{
  flex:1;padding:8px;border:none;border-radius:9999px;
  background:var(--green);color:#fff;
  font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;
}
.edit-cancel{
  padding:8px 14px;border:none;border-radius:9999px;
  background:var(--surface2);color:var(--ink2);
  box-shadow:inset 0 0 0 1px var(--ring-md);
  font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;
}
.mcheck{
  width:36px;height:36px;min-width:36px;min-height:36px;
  border-radius:9px;border:none;
  box-shadow:inset 0 0 0 2px rgba(28,20,8,0.18);
  background:var(--surface2);cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.mcheck.on{background:var(--green);box-shadow:none;color:#fff}
.mname{flex:1;font-size:13px;font-weight:600}
.mdel{background:none;border:none;color:var(--ink4);font-size:22px;cursor:pointer;padding:8px;line-height:1;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

/* ── Assign bar ── */
.abar{
  background:var(--surface);
  box-shadow:inset 0 0 0 2px var(--green);
  border-radius:12px;padding:10px 12px;margin-bottom:10px;display:none;
}
.abar.show{display:block}
.abar p{font-size:11px;color:var(--ink);font-weight:600;margin-bottom:7px}
.abtns{display:flex;gap:7px}
.abtn{
  flex:1;padding:8px;border:none;
  box-shadow:inset 0 0 0 1px var(--ring-md);
  border-radius:9999px;background:var(--surface2);
  color:var(--ink);font-size:11px;font-weight:600;
  font-family:inherit;cursor:pointer;
}
.abtn:active{background:var(--ink);color:var(--surface)}

/* ── Stats ── */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.scard{
  background:var(--surface);border-radius:20px;padding:16px 12px;text-align:center;
  box-shadow:0 0 0 2px var(--court-line),inset 0 0 0 1px var(--ring);
}
.snum{font-size:30px;font-weight:700;color:var(--ink);letter-spacing:-0.04em}
.slbl{
  font-size:10px;color:var(--ink3);margin-top:4px;
  font-family:ui-monospace,monospace;text-transform:uppercase;letter-spacing:0.06em;
}
.pslist{display:flex;flex-direction:column;gap:6px}
.psi{

// members = fixed roster, each has { id, name, skill, present, losses, wins }

let timers = {}, cStarts = {};
let assignP = null, selSkill = 1;
let editingId = null, editSkill = 1;
const COURT_NAMES = ['A','B','C','D'];

// court state is local only (not synced — each device manages their own view)
let courtState = {}; // courtState[cid] = [{memberId, teamSlot}]
function courtIds() { return Array.from({length: numCourts}, (_, i) => i); }
function initCourtState() {
  for (let i = 0; i < 4; i++) { if (!courtState[i]) courtState[i] = []; }

function renderCourts() {
  const track = document.getElementById('court-track');

    <div class="court" id="court-${cid}">

      </div>

      <div class="ctimer" id="ct${cid}">等待開始</div>
      <div class="cbtns">
        <button class="cbtn s" onclick="startCourt(${cid})">開始</button>

  // dots

  document.getElementById('btn-add-court').disabled = numCourts >= 4;
  document.getElementById('court-count-lbl').textContent = `共 ${numCourts} 場`;
  // assign buttons
  document.getElementById('assign-btns').innerHTML =
    courtIds().map(cid => `<button class="abtn" onclick="assignTo(${cid})">上 ${COURT_NAMES[cid]} 場</button>`).join('') +
    `<button class="abtn" onclick="cancelAssign()" style="flex:0;padding:8px 12px;color:var(--walnut)">✕</button>`;
  // dot sync on scroll
  track.onscroll = () => {
    const idx = Math.round(track.scrollLeft / track.clientWidth);

  };

}

function addCourt() {
  if (numCourts >= 4) return;
  numCourts++;
  save(); renderCourts(); render();
  // scroll to new court
  const t = document.getElementById('court-track');
  setTimeout(() => t.scrollTo({left: (numCourts-1)*t.clientWidth, behavior:'smooth'}), 50);
  toast(COURT_NAMES[numCourts-1] + ' 場已加入');
}

function removeCourt() {
  if (numCourts <= 1) return;
  const last = numCourts - 1;
  if (courtState[last] && courtState[last].length > 0) {
    toast('請先清空 ' + COURT_NAMES[last] + ' 場'); return;
  }
  clearInterval(timers[last]); timers[last] = null; cStarts[last] = null; courtState[last] = [];
  numCourts--;
  save(); renderCourts(); render();
  toast(COURT_NAMES[numCourts] + ' 場已移除');
}

function save() {
  dbRef.set({ players: members, totalGames, numCourts });
}

function load() {
  dbRef.on('value', snap => {
    const d = snap.val();
    if (!d) { initCourtState(); renderCourts(); render(); return; }
    members = (d.players || d.members || []);
    totalGames = d.totalGames || 0;
    numCourts = d.numCourts || 2;
    initCourtState();
    renderCourts(); render();
  });
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2000);
}

function switchTab(t) {
  ['court','members','stats'].forEach((x,i) => {
    document.querySelectorAll('.tab')[i].classList.toggle('active', x===t);
    document.getElementById('tab-'+x).classList.toggle('active', x===t);
  });
  if (t==='stats') renderStats();
}

function selSk(v) {
  selSkill = v;
  document.querySelectorAll('.sk-opt').forEach(b => b.classList.toggle('active', +b.dataset.sk===v));
}

function skillDots(sk) {
  return `<span class="sdot s${sk}"><span></span><span></span><span></span></span>`;
}
function skillText(sk) { return ['','●','●●','●●●'][sk]||''; }

// ── Members ──
function addMember() {
  const inp = document.getElementById('pname'), name = inp.value.trim();
  if (!name) { toast('請輸入姓名'); return; }
  if (members.find(m => m.name === name)) { toast('姓名已存在'); return; }
  members.push({ id: uid(), name, skill: selSkill, playing: true, lastPlayTime: 0, gamesPlayed: 0 });
  inp.value = ''; save(); render(); toast(name + ' 加入！');
}

function removeMember(id) {
  const m = members.find(x => x.id === id);
  if (getCourtMember(id)) { toast('球員正在場上'); return; }
  if (!confirm('確定移除 ' + (m ? m.name : '') + '？')) return;
  members = members.filter(x => x.id !== id);
  courtIds().forEach(cid => { courtState[cid] = courtState[cid].filter(x => x.memberId !== id); });
  save(); render();
}

function togglePresent(id) {
  const m = members.find(x => x.id === id);
  if (!m) return;
  if (getCourtMember(id)) { toast('球員正在場上，無法更改出席'); return; }
  m.playing = !m.playing;
  save(); render();
}

function clearAllPresent() {
  let changed = false;
  members.forEach(m => {
    if (m.playing && !getCourtMember(m.id)) { m.playing = false; changed = true; }
  });
  if (changed) { save(); render(); toast('已全部取消出席'); }
  else toast('沒有可取消的球員');
}

function startEdit(id) {
  const m = members.find(x => x.id === id);
  if (!m) return;
  editingId = id; editSkill = m.skill;
  render();
  requestAnimationFrame(() => {
    const inp = document.getElementById('edit-inp-' + id);
    if (inp) { inp.focus(); inp.select(); }
  });
}

function setEditSkill(sk) { editSkill = sk; render(); }

function saveEdit() {
  const m = members.find(x => x.id === editingId);
  if (!m) { editingId = null; render(); return; }
  const inp = document.getElementById('edit-inp-' + editingId);
  const newName = inp ? inp.value.trim() : m.name;
  if (!newName) { toast('請輸入姓名'); return; }
  if (members.find(x => x.id !== editingId && x.name === newName)) { toast('姓名已存在'); return; }
  m.name = newName; m.skill = editSkill;
  editingId = null; save(); render(); toast('已更新');
}

function cancelEdit() { editingId = null; render(); }

// ── Court helpers ──
function getCourtMember(memberId) {
  for (let cid of courtIds()) {
    const cs = courtState[cid].find(x => x.memberId === memberId);
    if (cs) return { cid, ...cs };
  }
  return null;
}

function getCourtPlayers(cid) {
  return courtState[cid].map(cs => {
    const m = members.find(x => x.id === cs.memberId);
    return m ? { ...m, teamSlot: cs.teamSlot } : null;
  }).filter(Boolean);
}

function isOnCourt(memberId) {
  return courtIds().some(cid => courtState[cid].some(x => x.memberId === memberId));
}

// ── Queue ──
function getQueue() {
  return members
    .filter(m => m.playing && !isOnCourt(m.id))
    .sort((a, b) =>
      (a.gamesPlayed || 0) - (b.gamesPlayed || 0) ||
      (a.lastPlayTime || 0) - (b.lastPlayTime || 0)
    );
}

// ── Balanced auto assign ──
function balancedAssign(pool, freeSlots) {
  const n = pool.length;
  const Lslots = freeSlots.filter(s => s<=1);
  const Rslots = freeSlots.filter(s => s>=2);
  const Lcount = Lslots.length;
  if (n===0) return;
  if (Lcount===0) {
    pool.forEach((p, i) => { p._slot = Rslots[i]; });
    return;
  }
  // Mixing priority: among splits with skillDiff<=2, pick the one
  // where teammates have played together the fewest times.
  // Only fall back to minimum skillDiff when no split qualifies.
  let best = null; // { combo, diff, ps }
  function combo(start, chosen) {
    if (chosen.length === Lcount) {
      const rest = pool.map((_,i)=>i).filter(i => !chosen.includes(i));
      const diff = Math.abs(
        chosen.reduce((s,i) => s+pool[i].skill, 0) -
        rest.reduce((s,i) => s+pool[i].skill, 0)
      );
      // Partner-repeat score: sum of times each same-team pair has played together
      let ps = 0;
      for (let a=0; a<chosen.length-1; a++)
        for (let b=a+1; b<chosen.length; b++)
          ps += (pool[chosen[a]].playedWith || {})[pool[chosen[b]].id] || 0;
      for (let a=0; a<rest.length-1; a++)
        for (let b=a+1; b<rest.length; b++)
          ps += (pool[rest[a]].playedWith || {})[pool[rest[b]].id] || 0;
      if (!best) { best = { combo:[...chosen], diff, ps }; return; }
      const { diff:bd, ps:bp } = best;
      // Prefer: skill diff <=2 with lowest partner repeat; fallback to min diff
      if (diff<=2 && (bd>2 || ps<bp || (ps===bp && diff<bd)))
        best = { combo:[...chosen], diff, ps };
      else if (bd>2 && diff<bd)
        best = { combo:[...chosen], diff, ps };
      return;
    }
    for (let i=start; i<n; i++) combo(i+1, [...chosen, i]);
  }
  combo(0, []);
  if (!best) return;
  best.combo.forEach((idx,i) => { pool[idx]._slot = Lslots[i]; });
  pool.map((_,i)=>i).filter(i=>!best.combo.includes(i)).forEach((idx,i) => { pool[idx]._slot = Rslots[i]; });
}

function autoFill() {
  const raw = getQueue();

  // Shuffle within each gamesPlayed tier so the same group of players
  // doesn't always get picked together when they share identical scores.
  // Players with fewer games still have strict priority over those with more.
  if (raw.length > 0) {
    let start = 0;
    while (start < raw.length) {
      const tierGames = raw[start].gamesPlayed || 0;
      let end = start;
      while (end < raw.length && (raw[end].gamesPlayed || 0) === tierGames) end++;
      // Fisher-Yates shuffle just this tier
      for (let i = end - 1; i > start; i--) {
        const j = start + Math.floor(Math.random() * (i - start + 1));
        [raw[i], raw[j]] = [raw[j], raw[i]];
      }
      start = end;
    }
  }

  const queue = raw; let filled = 0;
  courtIds().forEach(cid => {
    const cp = getCourtPlayers(cid);
    const needed = 4 - cp.length;
    if (needed <= 0 || queue.length < needed) return;
    const pool = queue.splice(0, needed);
    // Shuffle pool so players who finished together don't always form the same teams
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    const usedSlots = courtState[cid].map(x => x.teamSlot);
    const freeSlots = [0,1,2,3].filter(s => !usedSlots.includes(s));
    balancedAssign(pool, freeSlots);
    pool.forEach(p => {
      courtState[cid].push({ memberId: p.id, teamSlot: p._slot });
      filled++;
    });
  });
  render();
  toast(filled > 0 ? '已安排 ' + filled + ' 位球員上場' : '沒有可排的球員');
}

// ── Court actions ──
function startCourt(cid) {
  if (getCourtPlayers(cid).length < 2) { toast('至少需要 2 位球員'); return; }
  cStarts[cid] = Date.now();
  clearInterval(timers[cid]);
  timers[cid] = setInterval(() => {
    const el = document.getElementById('ct' + cid);
    if (!el || !cStarts[cid]) return;
    const s = Math.floor((Date.now() - cStarts[cid]) / 1000);
    el.innerHTML = '比賽中 <span>' + String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0') + '</span>';
  }, 1000);
  document.getElementById('court-' + cid).classList.add('playing');
  toast((cid===0?'A':'B') + '場開始！');
}

function endGame(cid) {
  const cp = getCourtPlayers(cid);
  if (cp.length === 0) { toast('場上沒有球員'); return; }
  clearInterval(timers[cid]);
  // Don't touch the other court's timer
  const Lteam = cp.filter(p => p.teamSlot <= 1);
  const Rteam = cp.filter(p => p.teamSlot >= 2);
  document.getElementById('mtitle').textContent = (cid===0?'A':'B') + '場結束';
  document.getElementById('mL').innerHTML = Lteam.map(p => p.name + skillDots(p.skill)).join('<br>') || '—';
  document.getElementById('mR').innerHTML = Rteam.map(p => p.name + skillDots(p.skill)).join('<br>') || '—';
  const modal = document.getElementById('wmodal');
  modal.dataset.cid = cid;
  modal.classList.add('show');
}

function confirmEnd() {
  const modal = document.getElementById('wmodal');
  const cid = +modal.dataset.cid;
  const cp = getCourtPlayers(cid);
  const now = Date.now();
  // Track which teammates played together (for mixing algorithm)
  const left  = cp.filter(p => p.teamSlot <= 1);
  const right = cp.filter(p => p.teamSlot >= 2);
  [left, right].forEach(team => {
    for (let a=0; a<team.length; a++) {
      for (let b=a+1; b<team.length; b++) {
        const mA = members.find(x => x.id === team[a].id);
        const mB = members.find(x => x.id === team[b].id);
        if (mA) { if (!mA.playedWith) mA.playedWith = {}; mA.playedWith[mB.id] = (mA.playedWith[mB.id]||0)+1; }
        if (mB) { if (!mB.playedWith) mB.playedWith = {}; mB.playedWith[mA.id] = (mB.playedWith[mA.id]||0)+1; }
      }
    }
  });
  cp.forEach(p => {
    const m = members.find(x => x.id === p.id);
    if (m) {
      m.lastPlayTime = now;
      m.gamesPlayed = (m.gamesPlayed || 0) + 1;
    }
  });
  totalGames++;
  courtState[cid] = [];
  cStarts[cid] = null;
  modal.classList.remove('show');
  document.getElementById('court-' + cid).classList.remove('playing');
  document.getElementById('ct' + cid).textContent = '等待開始';
  save(); render();
  toast('球員已回到候場');
}

function cancelEnd() {
  const modal = document.getElementById('wmodal');
  const cid = +modal.dataset.cid;
  modal.classList.remove('show');
  // restart timer for this court only
  if (cStarts[cid]) {
    timers[cid] = setInterval(() => {
      const el = document.getElementById('ct' + cid);
      if (!el || !cStarts[cid]) return;
      const s = Math.floor((Date.now() - cStarts[cid]) / 1000);
      el.innerHTML = '比賽中 <span>' + String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0') + '</span>';
    }, 1000);
  }
}

function clearCourt(cid) {
  clearInterval(timers[cid]);
  cStarts[cid] = null;
  courtState[cid] = [];
  document.getElementById('court-' + cid).classList.remove('playing');
  document.getElementById('ct' + cid).textContent = '等待開始';
  render(); toast('已清場');
}

// ── Manual assign ──
function selectP(id) {
  const m = members.find(x => x.id === id);
  if (!m || isOnCourt(id)) return;
  assignP = m;
  document.getElementById('abar').classList.add('show');
  document.getElementById('albl').textContent = m.name + ' → 選擇場地';
  render();
}

function assignTo(cid) {
  if (!assignP) return;
  const cp = courtState[cid];
  if (cp.length >= 4) { toast('場地已滿'); return; }
  const usedSlots = cp.map(x => x.teamSlot);
  const slot = [0,1,2,3].find(s => !usedSlots.includes(s));
  cp.push({ memberId: assignP.id, teamSlot: slot });
  toast(assignP.name + ' → ' + (cid===0?'A':'B') + '場 ' + (slot<=1?'左隊':'右隊'));
  assignP = null;
  document.getElementById('abar').classList.remove('show');
  render();
}

function cancelAssign() {
  assignP = null;
  document.getElementById('abar').classList.remove('show');
  render();
}

// ── Render ──
function getWaitTxt(m) {
  if (!m.lastPlayTime) return '新加入';
  const min = Math.floor((Date.now() - m.lastPlayTime) / 60000);
  return min < 1 ? '剛下場' : '等 ' + min + ' 分';
}

function renderSlots() {
  courtIds().forEach(cid => {
    [0,1,2,3].forEach(si => {
      const el = document.getElementById('s' + cid + '-' + si);
      if (!el) return;
      const cs = courtState[cid].find(x => x.teamSlot === si);
      const m = cs ? members.find(x => x.id === cs.memberId) : null;
      if (m) {
        el.classList.add('filled');
        el.innerHTML = '<span class="sn">' + m.name + '</span><span class="sk">' + skillText(m.skill) + '</span>';
      } else {
        el.classList.remove('filled');
        el.innerHTML = '<span class="sn">空位</span>';
      }
    });
  });
}

function render() {
  renderSlots();
  const queue = getQueue();
  const presentCount = members.filter(m => m.playing).length;
  const onCourtCount = courtIds().reduce((s,cid) => s + courtState[cid].length, 0);

  document.getElementById('qb1').textContent = queue.length + ' 人';
  document.getElementById('mbadge').textContent = members.length + ' 人';
  document.getElementById('stxt').textContent = '場上 ' + onCourtCount + ' 人 · 候場 ' + queue.length + ' 人 · 出席 ' + presentCount + ' 人';

  // Court queue list
  document.getElementById('cql').innerHTML = queue.length === 0
    ? '<div class="empty"><div class="ico">🏸</div><p>點球員選場地，或按⚡自動排場</p></div>'
    : queue.map((m,i) => `
      <div class="qi${assignP&&assignP.id===m.id?' sel':''}" onclick="selectP('${m.id}')">
        <div class="qrank${i<4?' top':''}">${i+1}</div>
        <div class="qinfo">
          <div class="qname">${m.name}${skillDots(m.skill)}</div>
          <div class="qmeta"><span class="w">${getWaitTxt(m)}</span> · ${m.gamesPlayed || 0} 場</div>
        </div>
        <div class="qbdg bdg-n">等待</div>
      </div>`).join('');

  // Members list
  document.getElementById('mlist').innerHTML = members.length === 0
    ? '<div class="empty"><div class="ico">👥</div><p>還沒有球員</p></div>'
    : members.map(m => {
      if (editingId === m.id) return `
        <div class="mi editing">
          <div class="edit-row">
            <input id="edit-inp-${m.id}" class="edit-inp" type="text" value="${m.name}" maxlength="8"
              onkeypress="if(event.key==='Enter')saveEdit()">
            <div class="edit-skills">
              <button class="edit-sk${editSkill===1?' active':''}" onclick="setEditSkill(1)">●</button>
              <button class="edit-sk${editSkill===2?' active':''}" onclick="setEditSkill(2)">●●</button>
              <button class="edit-sk${editSkill===3?' active':''}" onclick="setEditSkill(3)">●●●</button>
            </div>
          </div>
          <div class="edit-actions">
            <button class="edit-save" onclick="saveEdit()">儲存</button>
            <button class="edit-cancel" onclick="cancelEdit()">取消</button>
          </div>
        </div>`;
      return `
        <div class="mi${m.playing?'':' absent'}">
          <div class="mcheck${m.playing?' on':''}" onclick="togglePresent('${m.id}')">${m.playing?'✓':''}</div>
          <div class="mname" onclick="startEdit('${m.id}')" style="cursor:pointer;flex:1">${m.name}${skillDots(m.skill)}</div>
          <button class="mdel" onclick="removeMember('${m.id}')">×</button>
        </div>`;
    }).join('');
}

function renderStats() {
  const onCourtCount = courtIds().reduce((s,cid) => s + courtState[cid].length, 0);
  document.getElementById('st0').textContent = members.length;
  document.getElementById('st1').textContent = totalGames;
  document.getElementById('st2').textContent = members.filter(m=>m.playing).length;
  document.getElementById('st3').textContent = onCourtCount;
  const sorted = [...members].sort((a,b) =>
    (b.gamesPlayed || 0) - (a.gamesPlayed || 0) ||
    (b.lastPlayTime || 0) - (a.lastPlayTime || 0)
  );
  document.getElementById('psl').innerHTML = sorted.length === 0
    ? '<div class="empty"><div class="ico">📊</div><p>還沒有資料</p></div>'
    : sorted.map(m => `
      <div class="psi">
        <div class="psn">${m.name}${skillDots(m.skill)}</div>
        <div class="psnums">
          <div class="psnum"><div class="psval">${m.gamesPlayed || 0}</div><div class="pskey">已上場</div></div>
          <div class="psnum"><div class="psval">${m.playing?'出席':'缺席'}</div><div class="pskey">今日</div></div>
        </div>
      </div>`).join('');
}

function doReset() {
  if (!confirm('重置今日候場順序？所有人重新排隊')) return;
  members.forEach(m => { m.lastPlayTime = 0; m.gamesPlayed = 0; m.playedWith = {}; });
  totalGames = 0;
  save(); render(); toast('已重置');
}

load();
</script>
</body>
</html>
